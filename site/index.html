<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Status</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f6f7f9; color: #1f2937; }
    main { width: min(680px, calc(100vw - 40px)); }
    h1 { font-size: clamp(28px, 5vw, 48px); margin: 0 0 12px; letter-spacing: 0; }
    p { font-size: 16px; line-height: 1.7; margin: 0; color: #4b5563; }
    @media (prefers-color-scheme: dark) {
      body { background: #101216; color: #f3f4f6; }
      p { color: #cbd5e1; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Service online</h1>
    <p>This host is serving a normal static page. Administrative access is intentionally not exposed here.</p>
  </main>
</body>
</html>
