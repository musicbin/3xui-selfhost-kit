<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>端口转发节点</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #f6f8fb;
      --text: #172033;
      --muted: #667085;
      --line: #d7deea;
      --panel: #ffffff;
      --primary: #2563eb;
      --danger: #b42318;
      --soft: #eef4ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    main { width: min(1120px, calc(100vw - 32px)); margin: 28px auto 48px; }
    header { display: flex; justify-content: space-between; gap: 18px; align-items: end; margin-bottom: 20px; }
    h1 { margin: 0 0 8px; font-size: 30px; letter-spacing: 0; }
    p { color: var(--muted); line-height: 1.65; margin: 0; }
    section { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 20px; margin-bottom: 18px; }
    label { display: block; font-weight: 700; margin: 0 0 8px; }
    input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 11px;
      font: inherit;
      color: var(--text);
      background: var(--panel);
    }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    button {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      padding: 0 15px;
      background: var(--primary);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #344054; }
    button.danger { background: var(--danger); }
    code { display: block; padding: 12px; border-radius: 6px; background: var(--soft); color: var(--text); word-break: break-all; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; border-bottom: 1px solid var(--line); padding: 10px 8px; vertical-align: middle; }
    th { color: #475467; font-size: 13px; }
    .status { white-space: pre-wrap; }
    .pill { display: inline-block; border: 1px solid var(--line); border-radius: 999px; padding: 3px 8px; font-size: 12px; color: #475467; }
    @media (max-width: 820px) {
      header { display: block; }
      .grid, .grid.two { grid-template-columns: 1fr; }
      table, thead, tbody, tr, th, td { display: block; }
      thead { display: none; }
      td { border-bottom: 0; padding: 6px 0; }
      tr { border-bottom: 1px solid var(--line); padding: 10px 0; }
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #e5e7eb;
        --muted: #a7b0c0;
        --line: #344054;
        --panel: #111827;
        --soft: #172033;
      }
      th { color: #cbd5e1; }
      .pill { color: #cbd5e1; }
    }
  </style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>端口转发节点</h1>
      <p>用当前服务器域名和端口访问其他域名或 IP 的端口。保存后会在 3X-UI 入站里生成 <strong>tunnel</strong> 节点。</p>
    </div>
    <span class="pill" id="serverHost"></span>
  </header>

  <section>
    <div class="grid two">
      <div>
        <label for="adminToken">管理 Token</label>
        <input id="adminToken" type="password" autocomplete="off" placeholder="安装摘要里的 Rules editor token">
      </div>
      <div>
        <label for="remark">备注</label>
        <input id="remark" placeholder="留空自动生成">
      </div>
    </div>
  </section>

  <section>
    <div class="grid">
      <div>
        <label for="listenPort">当前服务器端口</label>
        <input id="listenPort" type="number" inputmode="numeric" min="1" max="65535" placeholder="27677">
      </div>
      <div>
        <label for="targetAddress">目标域名或 IP</label>
        <input id="targetAddress" placeholder="api.example.com">
      </div>
      <div>
        <label for="targetPort">目标端口</label>
        <input id="targetPort" type="number" inputmode="numeric" min="1" max="65535" placeholder="9999">
      </div>
    </div>
    <div class="grid two" style="margin-top:14px">
      <div>
        <label for="network">协议</label>
        <select id="network">
          <option value="tcp">tcp</option>
          <option value="udp">udp</option>
          <option value="tcp,udp">tcp,udp</option>
        </select>
      </div>
      <div>
        <label for="listen">监听 IP</label>
        <select id="listen">
          <option value="0.0.0.0">0.0.0.0 公网访问</option>
          <option value="127.0.0.1">127.0.0.1 仅本机</option>
        </select>
      </div>
    </div>
    <div class="actions">
      <button onclick="saveForward()">保存转发节点</button>
      <button class="secondary" onclick="loadForwards()">刷新列表</button>
      <button class="secondary" onclick="copyPreview()">复制访问地址</button>
    </div>
    <p style="margin-top:14px">访问地址</p>
    <code id="preview"></code>
    <p class="status" id="status" style="margin-top:12px"></p>
  </section>

  <section>
    <h1 style="font-size:22px">已创建节点</h1>
    <table>
      <thead>
        <tr>
          <th>备注</th>
          <th>访问地址</th>
          <th>目标</th>
          <th>协议</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </section>
</main>
<script>
  const host = location.hostname || "当前服务器域名";
  const apiBase = location.origin + "/subconfig-api";
  const tokenEl = document.getElementById("adminToken");
  const listenPortEl = document.getElementById("listenPort");
  const targetAddressEl = document.getElementById("targetAddress");
  const targetPortEl = document.getElementById("targetPort");
  const networkEl = document.getElementById("network");
  const listenEl = document.getElementById("listen");
  const remarkEl = document.getElementById("remark");
  const previewEl = document.getElementById("preview");
  const statusEl = document.getElementById("status");
  const rowsEl = document.getElementById("rows");
  document.getElementById("serverHost").textContent = host;
  tokenEl.value = localStorage.getItem("xuiForwardAdminToken") || "";

  function headers() {
    return {
      "Content-Type": "application/json",
      "X-Admin-Token": tokenEl.value.trim()
    };
  }

  function preview() {
    const port = listenPortEl.value.trim() || "端口";
    previewEl.textContent = host + ":" + port;
  }

  function validPort(value, label) {
    if (!/^[0-9]+$/.test(value)) {
      throw new Error(label + "必须填写数字端口。");
    }
    const port = Number(value);
    if (!Number.isInteger(port) || port < 1 || port > 65535) {
      throw new Error(label + "必须是 1-65535。");
    }
    return String(port);
  }

  listenPortEl.addEventListener("input", preview);
  preview();

  async function api(path, options = {}) {
    const response = await fetch(apiBase + path, {
      ...options,
      headers: {...headers(), ...(options.headers || {})}
    });
    const text = await response.text();
    let data;
    try { data = JSON.parse(text); } catch { data = {success: false, error: text}; }
    if (!response.ok || data.success === false) {
      throw new Error(data.error || data.msg || response.statusText);
    }
    return data;
  }

  async function saveForward() {
    try {
      statusEl.textContent = "正在保存...";
      localStorage.setItem("xuiForwardAdminToken", tokenEl.value.trim());
      const listenPort = validPort(listenPortEl.value.trim(), "当前服务器端口");
      const targetPort = validPort(targetPortEl.value.trim(), "目标端口");
      await api("/forwards", {
        method: "POST",
        body: JSON.stringify({
          listenPort,
          targetAddress: targetAddressEl.value.trim(),
          targetPort,
          network: networkEl.value,
          listen: listenEl.value,
          remark: remarkEl.value.trim()
        })
      });
      statusEl.textContent = "已保存。请确认云安全组也放行了 " + listenPort + " 端口。";
      await loadForwards();
    } catch (error) {
      statusEl.textContent = "保存失败: " + error.message;
    }
  }

  async function loadForwards() {
    try {
      localStorage.setItem("xuiForwardAdminToken", tokenEl.value.trim());
      const data = await api("/forwards");
      rowsEl.innerHTML = "";
      for (const item of data.forwards || []) {
        const tr = document.createElement("tr");
        const access = host + ":" + item.listenPort;
        tr.innerHTML = `
          <td>${escapeHtml(item.remark || "")}</td>
          <td><code>${escapeHtml(access)}</code></td>
          <td>${escapeHtml(item.targetAddress || "")}:${escapeHtml(item.targetPort || "")}</td>
          <td>${escapeHtml(item.network || "tcp")}</td>
          <td><button class="danger" data-id="${item.id}">删除</button></td>
        `;
        tr.querySelector("button").addEventListener("click", () => deleteForward(item.id));
        rowsEl.appendChild(tr);
      }
      if (!rowsEl.children.length) {
        rowsEl.innerHTML = "<tr><td colspan=\"5\">暂无 tunnel 转发节点。</td></tr>";
      }
    } catch (error) {
      statusEl.textContent = "读取失败: " + error.message;
    }
  }

  async function deleteForward(id) {
    if (!confirm("确认删除这个转发节点？")) return;
    try {
      statusEl.textContent = "正在删除...";
      await api("/forwards/delete", {method: "POST", body: JSON.stringify({id})});
      statusEl.textContent = "已删除。";
      await loadForwards();
    } catch (error) {
      statusEl.textContent = "删除失败: " + error.message;
    }
  }

  async function copyPreview() {
    preview();
    await navigator.clipboard.writeText(previewEl.textContent);
    statusEl.textContent = "已复制访问地址。";
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
</script>
</body>
</html>
