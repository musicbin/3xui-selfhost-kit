name: shell-check

on:
  push:
  pull_request:

jobs:
  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bash syntax
        run: |
          bash -n install.sh
          bash -n scripts/manage.sh
          bash -n scripts/apply-presets.sh
          bash -n scripts/domain-cert.sh
          bash -n scripts/subscription.sh
          bash -n scripts/start-services.sh
          bash -n scripts/menu.sh
          python3 -m py_compile scripts/subconfig-api.py
